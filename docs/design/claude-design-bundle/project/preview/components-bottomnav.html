<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 0; background: #0f0a1e; min-height: 260px; }
.phone { width: 320px; margin: 0 auto; }
.nav { position: relative; background: rgba(26,16,53,.95); border-top: 1px solid rgba(168,85,247,.15); display: flex; align-items: center; justify-content: space-around; padding: 8px 0 12px; backdrop-filter: blur(10px); }
.item { display: flex; flex-direction: column; align-items: center; gap: 2px; background: transparent; border: none; cursor: pointer; padding: 0 8px; }
.icon { font-size: 18px; }
.lbl { font-size: 9px; color: #6b7280; font-weight: 500; }
.item.on .lbl { color: #f59e0b; font-weight: 700; }
.fab { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 22px; border: none; box-shadow: 0 4px 12px rgba(245,158,11,.4); margin-top: -20px; }
.label { color:#6b7280; font-size:10px; text-transform:uppercase; letter-spacing:.05em; text-align:center; padding: 14px 0 8px }
</style></head><body>
<div class="phone">
  <div class="label">Bottom tab bar (mobile)</div>
  <div class="nav">
    <button class="item on"><span class="icon">🏠</span><span class="lbl">Inicio</span></button>
    <button class="item"><span class="icon">✅</span><span class="lbl">Tareas</span></button>
    <button class="fab">+</button>
    <button class="item"><span class="icon">📅</span><span class="lbl">Calendario</span></button>
    <button class="item"><span class="icon">🏆</span><span class="lbl">Logros</span></button>
  </div>
</div>
</body></html>
