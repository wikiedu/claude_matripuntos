<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.card { background: rgba(26,16,53,.85); border: 1px solid rgba(168,85,247,.15); border-radius: 12px; padding: 16px; text-align: center; }
.num { font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
.lbl { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }
.meta { font-family: ui-monospace, monospace; font-size: 10px; color: #6b7280; margin-top: 8px; }
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="num" style="font-size:32px; font-weight:700; color:#fff">+15.5<span style="font-size:14px; opacity:.7">&nbsp;pts</span></div>
    <div class="lbl">Balance numeric</div>
    <div class="meta">32 / 700</div>
  </div>
  <div class="card" style="border-color:rgba(245,158,11,.3)">
    <div style="font-size:20px">🔥</div>
    <div class="num" style="font-size:40px; font-weight:900; color:#f59e0b; line-height:1">12</div>
    <div class="lbl">Streak number</div>
    <div class="meta">40 / 900</div>
  </div>
  <div class="card" style="border-color:rgba(168,85,247,.2)">
    <div style="font-size:20px">⚖️</div>
    <div class="num" style="font-size:40px; font-weight:900; color:#a855f7; line-height:1">4</div>
    <div class="lbl">Weekly streak</div>
    <div class="meta">40 / 900</div>
  </div>
</div>
</body></html>
