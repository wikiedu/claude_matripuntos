<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.wrap { display: flex; gap: 18px; align-items: center; justify-content: center; padding: 12px 0; flex-wrap: wrap; }
.logo { display: flex; align-items: center; gap: 10px; }
.mark { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245,158,11,.35); }
.word { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -.02em; color: #e2e8f0; }
.word .puntos { color: #f59e0b; }
.tag { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.card { padding: 14px 16px; background: rgba(26,16,53,.85); border: 1px solid rgba(168,85,247,.15); border-radius: 12px; min-width: 240px; }
.card.light { background: #fffbf0; border-color: #fde68a; }
.card.light .word { color: #1c1917; }
.card.light .tag { color: #78716c; }
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="logo"><div class="mark">📊</div><div><div class="word">Matri<span class="puntos">puntos</span></div><div class="tag">Un juego para dos</div></div></div>
  </div>
  <div class="card light">
    <div class="logo"><div class="mark">📊</div><div><div class="word">Matri<span class="puntos">puntos</span></div><div class="tag">Un juego para dos</div></div></div>
  </div>
</div>
</body></html>
