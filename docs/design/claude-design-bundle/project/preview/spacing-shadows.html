<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px 10px; }
.box { height: 80px; background: rgba(26,16,53,.85); border: 1px solid rgba(168,85,247,.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 11px; font-family: ui-monospace, monospace; }
.lbl { font-size: 10px; color: #6b7280; text-align: center; margin-top: 10px; text-transform: uppercase; letter-spacing: .05em; }
</style></head><body>
<div class="grid">
  <div><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,.15)">sh-sm</div><div class="lbl">1 / 2 · divider</div></div>
  <div><div class="box" style="box-shadow:0 4px 12px rgba(0,0,0,.2)">sh-md</div><div class="lbl">4 / 12 · card</div></div>
  <div><div class="box" style="box-shadow:0 4px 24px rgba(79,70,229,.3); background:linear-gradient(135deg,#4f46e5,#7c3aed); color:#fff">sh-lg</div><div class="lbl">indigo hero glow</div></div>
  <div><div class="box" style="box-shadow:0 4px 12px rgba(245,158,11,.4); background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff">sh-amber</div><div class="lbl">FAB</div></div>
</div>
</body></html>
