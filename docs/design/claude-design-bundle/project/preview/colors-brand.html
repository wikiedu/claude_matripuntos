<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw { border-radius: 12px; padding: 14px 14px 12px; height: 110px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; position: relative; overflow: hidden; }
.sw .nm { font-size: 13px; font-weight: 600; }
.sw .hex { font-size: 11px; font-family: ui-monospace, monospace; opacity: .85; }
.sw.amber { background: linear-gradient(135deg, #f59e0b, #d97706); }
.sw.purple { background: linear-gradient(135deg, #a855f7, #7c3aed); }
.sw.indigo { background: linear-gradient(135deg, #4f46e5, #7c3aed); box-shadow: 0 4px 24px rgba(79,70,229,.3); }
.sw.pink { background: #ec4899; }
.sw.success { background: #22c55e; color: #0b2d13; }
.sw.danger { background: #ef4444; }
</style></head><body>
<div class="grid">
  <div class="sw amber"><div class="nm">Amber — CTA</div><div class="hex">#f59e0b → #d97706</div></div>
  <div class="sw purple"><div class="nm">Purple — Gamify</div><div class="hex">#a855f7 → #7c3aed</div></div>
  <div class="sw indigo"><div class="nm">Indigo — Balance</div><div class="hex">#4f46e5 → #7c3aed</div></div>
  <div class="sw pink"><div class="nm">Pink — Partner</div><div class="hex">#ec4899</div></div>
  <div class="sw success"><div class="nm">Success</div><div class="hex">#22c55e</div></div>
  <div class="sw danger"><div class="nm">Danger</div><div class="hex">#ef4444</div></div>
</div>
</body></html>
