<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: rgba(26,16,53,.85); border: 1px solid rgba(168,85,247,.15); border-radius: 12px; padding: 14px; }
.card.hl { border-color: rgba(245,158,11,.3); }
.row { display: flex; justify-content: space-between; align-items: center; }
.title { font-size: 13px; font-weight: 600; color: #e2e8f0; }
.meta { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.pts { font-size: 12px; font-weight: 700; color: #f59e0b; }
.avatar { width: 24px; height: 24px; border-radius: 50%; background: #7c3aed; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; }
.bar { height: 6px; background: rgba(168,85,247,.1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
.bar > i { display: block; height: 100%; background: linear-gradient(90deg, #a855f7, #7c3aed); border-radius: 3px; }
.hero { grid-column: 1 / -1; background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 16px; padding: 16px; box-shadow: 0 4px 24px rgba(79,70,229,.3); border: none; }
.hero .lbl { color: rgba(199,210,254,.8); font-size: 11px; font-weight: 500; margin-bottom: 6px; }
.hero .num { color: #fff; font-size: 28px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
</style></head><body>
<div class="grid">
  <div class="card hero">
    <div class="lbl">Balance actual de puntos</div>
    <div style="display:flex; justify-content:space-between; align-items:flex-end">
      <div><div class="num">+15.5<span style="font-size:14px; opacity:.7"> pts</span></div><div class="lbl" style="margin:2px 0 0">María</div></div>
      <div style="text-align:right"><div class="num" style="font-size:20px; opacity:.75">-15.5</div><div class="lbl" style="margin:2px 0 0">Carlos</div></div>
    </div>
  </div>
  <div class="card">
    <div class="meta">🍳 COCINA</div>
    <div class="row"><span class="title">Preparar cena</span><span class="pts">+12 MP</span></div>
    <div style="font-size:11px; color:#9ca3af; margin-top:4px">Hoy · 20:00</div>
  </div>
  <div class="card hl">
    <div class="row"><span class="title">🏆 Nivel 3</span><span class="pts" style="color:#a855f7">320 / 500</span></div>
    <div class="bar"><i style="width:64%"></i></div>
    <div style="font-size:10px; color:#6b7280; margin-top:6px">180 MP para subir de nivel</div>
  </div>
</div>
</body></html>
