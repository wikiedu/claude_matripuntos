<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items: end; }
.bar { background: linear-gradient(180deg, #a855f7, #7c3aed); border-radius: 6px; width: 100%; opacity: .9; }
.cell { text-align: center; }
.px { font-size: 12px; font-weight: 700; color: #e2e8f0; margin-top: 8px; }
.lbl { font-size: 10px; color: #6b7280; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="cell"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="lbl">sp-1</div></div>
  <div class="cell"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="lbl">sp-2</div></div>
  <div class="cell"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="lbl">sp-3 · card gap</div></div>
  <div class="cell"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="lbl">sp-4 · base</div></div>
  <div class="cell"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="lbl">sp-6 · pad</div></div>
  <div class="cell"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="lbl">sp-12 · hero</div></div>
</div>
</body></html>
