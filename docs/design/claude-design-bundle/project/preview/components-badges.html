<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; border: 1px solid transparent; }
.amber { background: rgba(245,158,11,.12); color: #f59e0b; border-color: rgba(245,158,11,.3); }
.purple { background: rgba(168,85,247,.15); color: #a855f7; border-color: rgba(168,85,247,.3); }
.success { background: rgba(34,197,94,.12); color: #22c55e; border-color: rgba(34,197,94,.3); }
.warning { background: rgba(250,204,21,.1); color: #facc15; border-color: rgba(250,204,21,.3); }
.danger { background: rgba(239,68,68,.1); color: #f87171; border-color: rgba(239,68,68,.3); }
.info { background: rgba(96,165,250,.1); color: #60a5fa; border-color: rgba(96,165,250,.25); }
.lbl { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-right: 8px; }
</style></head><body>
<div class="row"><span class="lbl">Points</span>
  <span class="pill amber">+15 MP</span>
  <span class="pill amber">×1.5 pts</span>
  <span class="pill amber">🔥 12 días</span>
</div>
<div class="row"><span class="lbl">Gamify</span>
  <span class="pill purple">Nivel 3</span>
  <span class="pill purple">+25%</span>
  <span class="pill purple">⚖️ Equilibrado</span>
</div>
<div class="row"><span class="lbl">Status</span>
  <span class="pill success">Completada</span>
  <span class="pill warning">Pendiente</span>
  <span class="pill danger">Vencida</span>
  <span class="pill info">🧊 Congelador</span>
</div>
<div class="row"><span class="lbl">Category</span>
  <span class="pill" style="background:rgba(255,255,255,.06); color:#e2e8f0; border-color:rgba(255,255,255,.1)">🍳 Cocina</span>
  <span class="pill" style="background:rgba(255,255,255,.06); color:#e2e8f0; border-color:rgba(255,255,255,.1)">🧹 Limpieza</span>
  <span class="pill" style="background:rgba(255,255,255,.06); color:#e2e8f0; border-color:rgba(255,255,255,.1)">🛒 Compras</span>
</div>
</body></html>
