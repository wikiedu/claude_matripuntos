<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.box { height: 70px; background: rgba(168,85,247,.2); border: 1px solid rgba(168,85,247,.4); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-size: 10px; color: #9ca3af; font-family: ui-monospace, monospace; }
.lbl { font-size: 10px; color: #6b7280; text-align: center; margin-top: 6px; text-transform: uppercase; letter-spacing: .05em; }
</style></head><body>
<div class="grid">
  <div><div class="box" style="border-radius:8px">8</div><div class="lbl">sm · badges</div></div>
  <div><div class="box" style="border-radius:10px">10</div><div class="lbl">md · cards</div></div>
  <div><div class="box" style="border-radius:12px">12</div><div class="lbl">lg · CTA</div></div>
  <div><div class="box" style="border-radius:16px">16</div><div class="lbl">xl · hero</div></div>
  <div><div class="box" style="border-radius:20px">20</div><div class="lbl">2xl · sheet</div></div>
  <div><div class="box" style="border-radius:9999px">full</div><div class="lbl">pill · chip</div></div>
</div>
</body></html>
