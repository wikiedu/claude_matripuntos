<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>13 · Microinteracciones de puntos — Matripuntos v2.1</title>
  <link rel="stylesheet" href="shared.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .ds-canvas-stage { background: #06030f !important; }
    .ds-canvas-section-title { color: #c4b5fd !important; }
    .ds-canvas-section-subtitle { color: #6b7280 !important; }
    .ds-canvas-artboard-label { color: #9ca3af !important; font-weight: 600 !important; }

    .h-pad { padding: 16px; }
    .h-title { font-size: 20px; font-weight: 800; color: var(--text-primary); margin: 0 0 4px; letter-spacing: -0.01em; }
    .h-sub { font-size: 12px; color: var(--text-tertiary); margin: 0 0 12px; line-height: 1.5; }

    /* Demo stage · all artboards share */
    .stage {
      position: relative; padding: 16px;
      min-height: 280px;
      display: flex; align-items: center; justify-content: center;
    }
    .stage-bg {
      position: absolute; inset: 12px;
      border-radius: 14px;
      background: radial-gradient(circle at 50% 40%, rgba(168,85,247,0.06), transparent 60%);
      border: 1px dashed var(--brd-subtle);
    }

    /* 01 · COMPLETE — points-rise */
    .check-btn {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--grad-cta);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: white; cursor: pointer;
      box-shadow: 0 12px 24px rgba(245,158,11,0.4);
      animation: tap 2.4s infinite;
      position: relative;
    }
    @keyframes tap {
      0%, 80%, 100% { transform: scale(1); }
      40% { transform: scale(0.92); box-shadow: 0 0 0 16px rgba(245,158,11,0.18); }
      50% { transform: scale(1); }
    }
    .points-rise {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px; font-weight: 800; color: var(--brand-amber);
      opacity: 0;
      animation: rise 2.4s infinite;
      pointer-events: none;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 12px rgba(245,158,11,0.5);
    }
    @keyframes rise {
      0%, 38% { opacity: 0; transform: translate(-50%, -10%); }
      45% { opacity: 1; transform: translate(-50%, -90%) scale(1.1); }
      90% { opacity: 1; transform: translate(-50%, -180%) scale(0.95); }
      100% { opacity: 0; transform: translate(-50%, -200%) scale(0.9); }
    }
    .ripple {
      position: absolute; left: 50%; top: 50%;
      width: 64px; height: 64px;
      border: 2px solid var(--brand-amber);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple 2.4s infinite;
      pointer-events: none;
      opacity: 0;
    }
    @keyframes ripple {
      0%, 38% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
      42% { opacity: 0.7; }
      90%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(2.6); }
    }

    /* 02 · BALANCE counter */
    .balance-demo {
      font-size: 56px; font-weight: 800; letter-spacing: -0.04em;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .balance-demo.counting {
      animation: counting 2.4s infinite;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @keyframes counting {
      0%, 30% { transform: scale(1); }
      40% { transform: scale(1.08); }
      70% { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .delta-chip {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.4);
      border-radius: 999px;
      font-size: 11px; font-weight: 700;
      color: var(--brand-amber);
      animation: deltachip 2.4s infinite;
    }
    @keyframes deltachip {
      0%, 30% { opacity: 0; transform: translateY(8px); }
      45% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-4px); }
    }

    /* 03 · LEVEL UP — confetti restrained */
    .level-card {
      width: 240px; padding: 20px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(245,158,11,0.20), rgba(168,85,247,0.10));
      border: 1px solid rgba(245,158,11,0.4);
      text-align: center;
      animation: levelpop 3.2s infinite;
    }
    @keyframes levelpop {
      0%, 95%, 100% { transform: scale(1); }
      8% { transform: scale(1.03); }
      18% { transform: scale(1); }
    }
    .level-card .em { font-size: 38px; line-height: 1; margin-bottom: 8px; }
    .level-card h3 { margin: 0 0 4px; font-size: 14px; font-weight: 800; color: var(--text-primary); }
    .level-card .lvl { font-size: 20px; font-weight: 800; color: var(--brand-amber); letter-spacing: -0.02em; margin: 4px 0 6px; }
    .level-card p { margin: 0; font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
    .confetti-piece {
      position: absolute; width: 6px; height: 10px;
      animation: fall 3.2s infinite;
      pointer-events: none;
      border-radius: 1px;
    }
    @keyframes fall {
      0%, 8% { opacity: 0; transform: translateY(-20px) rotate(0deg); }
      12% { opacity: 1; }
      60% { opacity: 1; }
      100% { opacity: 0; transform: translateY(160px) rotate(540deg); }
    }

    /* 04 · NEGOTIATE — tug of war */
    .negotiate-row {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      background: var(--surface-card); border: 1px solid var(--brd-subtle);
      border-radius: 12px; width: 280px;
    }
    .neg-bar {
      flex: 1; height: 6px;
      background: var(--surface-card2); border-radius: 4px;
      position: relative; overflow: visible;
    }
    .neg-bar .knob {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 18px; height: 18px;
      background: var(--grad-cta); border-radius: 50%;
      box-shadow: 0 4px 10px rgba(245,158,11,0.4);
      animation: tugknob 3.6s infinite ease-in-out;
    }
    @keyframes tugknob {
      0%, 100% { left: 30%; }
      45% { left: 75%; }
      55% { left: 75%; }
    }
    .neg-bar .fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--grad-cta); border-radius: 4px;
      animation: tugfill 3.6s infinite ease-in-out;
    }
    @keyframes tugfill {
      0%, 100% { width: 30%; }
      45% { width: 75%; }
      55% { width: 75%; }
    }
    .neg-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
    .neg-row .you { color: var(--brand-amber); font-weight: 700; }
    .neg-row .her { color: var(--brand-purple); font-weight: 700; }
    .neg-val { font-size: 14px; font-weight: 800; color: var(--text-primary); font-variant-numeric: tabular-nums; min-width: 38px; text-align: center; }

    /* 05 · UNDO swipe */
    .undo-row {
      width: 280px;
      padding: 14px; background: var(--surface-card);
      border: 1px solid var(--brd-subtle); border-radius: 12px;
      display: flex; align-items: center; gap: 12px;
      animation: swiperow 3.6s infinite;
      position: relative;
    }
    @keyframes swiperow {
      0%, 30% { transform: translateX(0); }
      40% { transform: translateX(-32px); }
      70% { transform: translateX(-32px); }
      80% { transform: translateX(0); }
    }
    .undo-row::after {
      content: 'Deshacer';
      position: absolute;
      right: -52px; top: 50%; transform: translateY(-50%);
      padding: 8px 12px;
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 8px;
      color: #fca5a5; font-weight: 700; font-size: 11px;
      opacity: 0;
      animation: undobtn 3.6s infinite;
    }
    @keyframes undobtn {
      0%, 30% { opacity: 0; }
      40%, 70% { opacity: 1; }
      80%, 100% { opacity: 0; }
    }

    /* 06 · LOADING shimmer */
    .skeleton {
      width: 280px; padding: 14px;
      background: var(--surface-card); border: 1px solid var(--brd-subtle);
      border-radius: 12px;
    }
    .sk-line {
      height: 12px; border-radius: 6px;
      background: linear-gradient(90deg, var(--surface-card2) 0%, rgba(168,85,247,0.15) 50%, var(--surface-card2) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite linear;
      margin-bottom: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Spec sheet */
    .spec-grid {
      display: grid; grid-template-columns: 80px 1fr 60px;
      gap: 8px 14px;
      font-size: 11px;
    }
    .spec-grid > div {
      padding: 8px 0;
      border-bottom: 1px dashed var(--brd-subtle);
    }
    .spec-grid .l { color: var(--text-tertiary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; }
    .spec-grid .v { color: var(--text-secondary); line-height: 1.4; }
    .spec-grid .v b { color: var(--text-primary); }
    .spec-grid .ms { font-variant-numeric: tabular-nums; color: var(--brand-amber); font-weight: 700; text-align: right; }

    .panel { width: 380px; padding: 22px; background: var(--surface-card); border: 1px solid var(--brd-subtle); border-radius: 14px; }
    .panel h3 { margin: 0 0 8px; font-size: 14px; font-weight: 800; color: var(--text-primary); }
    .panel p { margin: 0 0 10px; font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
    .panel ul { margin: 0; padding-left: 18px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .panel ul b { color: var(--text-primary); }
    .panel h4 { margin: 14px 0 6px; color: var(--brand-amber); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; }

    .demo-card {
      width: 320px;
      background: var(--surface-card); border: 1px solid var(--brd-subtle);
      border-radius: 14px; overflow: hidden;
    }
    .demo-head { padding: 14px 16px; border-bottom: 1px solid var(--brd-subtle); }
    .demo-head h4 { margin: 0; font-size: 13px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.01em; }
    .demo-head .sub { margin: 2px 0 0; font-size: 11px; color: var(--text-tertiary); }
    .demo-stage {
      min-height: 200px;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 50%, rgba(245,158,11,0.04), transparent 70%);
      position: relative;
    }
    .demo-stage.purple { background: radial-gradient(circle at 50% 50%, rgba(168,85,247,0.05), transparent 70%); }
    .demo-foot { padding: 10px 16px; font-size: 10px; color: var(--text-tertiary); border-top: 1px solid var(--brd-subtle); display: flex; justify-content: space-between; }
    .demo-foot b { color: var(--brand-amber); font-weight: 700; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <div id="root"></div>
  <script type="text/babel">
    function DemoCard({ title, sub, dur, easing, children, purple }) {
      return (
        <div className="demo-card">
          <div className="demo-head">
            <h4>{title}</h4>
            <div className="sub">{sub}</div>
          </div>
          <div className={'demo-stage' + (purple ? ' purple' : '')}>
            {children}
          </div>
          <div className="demo-foot">
            <span>duración · <b>{dur}</b></span>
            <span>easing · {easing}</span>
          </div>
        </div>
      );
    }

    /* 01 — task complete */
    function CompleteAnim() {
      return (
        <DemoCard title="01 · Tarea completada" sub="+MP rises, ripple, haptic light" dur="650 ms" easing="ease-out · cubic-bezier(.2,.8,.2,1)">
          <div style={{ position: 'relative', width: 64, height: 80 }}>
            <div className="ripple"></div>
            <div className="check-btn">✓</div>
            <div className="points-rise">+2.5</div>
          </div>
        </DemoCard>
      );
    }

    /* 02 — balance counter */
    function BalanceAnim() {
      return (
        <DemoCard title="02 · Saldo sube" sub="counter tween + delta chip" dur="800 ms" easing="ease-out">
          <div style={{ textAlign: 'center' }}>
            <div className="balance-demo counting">+8.5</div>
            <div style={{ marginTop: 4 }}><span className="delta-chip">+2.5 MP</span></div>
          </div>
        </DemoCard>
      );
    }

    /* 03 — level up */
    function LevelUpAnim() {
      const colors = ['#f59e0b', '#a855f7', '#22c55e', '#fbbf24', '#6366f1'];
      const pieces = Array.from({ length: 14 }).map((_, i) => ({
        c: colors[i % colors.length],
        l: 8 + (i * 19) % 84,
        d: (i * 0.12) % 1.4,
      }));
      return (
        <DemoCard title="03 · Subes de nivel" sub="card pop + 14 confetti pieces" dur="1.2 s" easing="spring · stiffness 200">
          <div style={{ position: 'relative', width: 240 }}>
            {pieces.map((p, i) => (
              <div key={i} className="confetti-piece" style={{
                background: p.c, left: p.l + '%', top: 0, animationDelay: p.d + 's',
              }}></div>
            ))}
            <div className="level-card">
              <div className="em">🏆</div>
              <h3>Has subido a</h3>
              <div className="lvl">Aprendiz · L2</div>
              <p>Has aprendido cómo va · ahora viene lo divertido.</p>
            </div>
          </div>
        </DemoCard>
      );
    }

    /* 04 — negotiate tug */
    function NegotiateAnim() {
      return (
        <DemoCard purple title="04 · Negociación · contraoferta" sub="slider tug-of-war animation" dur="1.0 s ida + 1.0 s vuelta" easing="ease-in-out">
          <div style={{ width: 280 }}>
            <div className="neg-row"><span className="her">Blanca · 1.5</span><span className="you">Tú · 3.0</span></div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div className="neg-val" style={{ color: 'var(--brand-purple)' }}>1.5</div>
              <div className="neg-bar">
                <div className="fill"></div>
                <div className="knob"></div>
              </div>
              <div className="neg-val" style={{ color: 'var(--brand-amber)' }}>3.0</div>
            </div>
            <p style={{ margin: '12px 0 0', fontSize: 11, color: 'var(--text-tertiary)', textAlign: 'center', lineHeight: 1.4 }}>
              Animación visualiza el rango sin lenguaje competitivo.
            </p>
          </div>
        </DemoCard>
      );
    }

    /* 05 — undo */
    function UndoAnim() {
      return (
        <DemoCard title="05 · Deshacer · swipe" sub="row slides 32px revealing destructive action" dur="240 ms" easing="ease-out">
          <div style={{ width: 280, paddingRight: 32 }}>
            <div className="undo-row">
              <div style={{ width: 8, height: 8, borderRadius: 50, background: '#22c55e' }}></div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-primary)' }}>Cocinar la cena</div>
                <div style={{ fontSize: 10, color: 'var(--text-tertiary)' }}>+2.5 MP · hace 30 s</div>
              </div>
              <div style={{ fontSize: 14, fontWeight: 800, color: 'var(--brand-amber)' }}>+2.5</div>
            </div>
          </div>
        </DemoCard>
      );
    }

    /* 06 — loading */
    function LoadingAnim() {
      return (
        <DemoCard purple title="06 · Cargando · shimmer" sub="never use spinners on data lists" dur="1.6 s · loop" easing="linear">
          <div className="skeleton">
            <div className="sk-line" style={{ width: '60%' }}></div>
            <div className="sk-line"></div>
            <div className="sk-line" style={{ width: '80%', marginBottom: 0 }}></div>
          </div>
        </DemoCard>
      );
    }

    /* SPEC SHEET */
    function Specs() {
      return (
        <div className="panel" style={{ width: 360 }}>
          <h3>Sistema de animación · spec</h3>
          <div className="spec-grid">
            <div className="l">Tap</div>
            <div className="v"><b>Scale 1 → 0.96</b> + box-shadow ring · ack del touch.</div>
            <div className="ms">120ms</div>

            <div className="l">Hover</div>
            <div className="v"><b>Translate -2px</b> + sombra. Solo en desktop.</div>
            <div className="ms">160ms</div>

            <div className="l">Punto sube</div>
            <div className="v"><b>+MP rises 90px</b> · scale 1.1 → 0.95 · opacity in/out.</div>
            <div className="ms">650ms</div>

            <div className="l">Saldo</div>
            <div className="v"><b>Counter tween</b> + scale pulse 1.08x.</div>
            <div className="ms">800ms</div>

            <div className="l">Subir nivel</div>
            <div className="v"><b>Spring pop</b> + 14 confetti pieces · UNA vez.</div>
            <div className="ms">1.2s</div>

            <div className="l">Negociación</div>
            <div className="v"><b>Slider tug</b> · easing in-out, no rebote.</div>
            <div className="ms">1.0s</div>

            <div className="l">Undo</div>
            <div className="v"><b>Slide 32px</b> · ease-out · 5s ventana.</div>
            <div className="ms">240ms</div>

            <div className="l">Skeleton</div>
            <div className="v"><b>Shimmer 200%</b> · linear loop. Nunca spinners.</div>
            <div className="ms">1.6s</div>

            <div className="l">Toast</div>
            <div className="v"><b>Slide-down</b> + bounce. Auto-dismiss 6s.</div>
            <div className="ms">280ms</div>

            <div className="l">Modal</div>
            <div className="v"><b>Fade + scale</b> 0.92 → 1. Backdrop blur 8s.</div>
            <div className="ms">220ms</div>
          </div>
        </div>
      );
    }

    function Decisions() {
      return (
        <div className="panel">
          <h3>Filosofía de animación</h3>
          <p><b>El sistema es un asistente, no un casino.</b> Cada animación tiene una función: feedback, jerarquía, o celebración honesta. Cero animaciones decorativas.</p>

          <h4>Tres categorías de animación</h4>
          <ul>
            <li><b>Acuse de recibo (120–280ms)</b> · tap, hover, undo. Confirma que la app te oyó. Imperceptible si va bien.</li>
            <li><b>Cambio de estado (240–800ms)</b> · counter, balance, level progress. Conecta valor antes y después.</li>
            <li><b>Celebración (1–1.5s)</b> · subir de nivel, hito grande. <b>Reservada</b> · si pasa cada día deja de celebrar.</li>
          </ul>

          <h4>Reglas duras</h4>
          <ul>
            <li><b>Nunca confeti por completar una tarea.</b> Confeti = nivel nuevo, hito grande. Diluirlo lo mata.</li>
            <li><b>Nunca animaciones &gt; 1.2s</b> en flujo normal. Sobrecargan el segundo uso.</li>
            <li><b>Reduced-motion respetado</b> · todo cae a fade simple si el usuario lo pide en SO.</li>
            <li><b>Haptic suave</b> · light en complete, medium en level up, none en hover/scroll.</li>
            <li><b>Sin sonido por defecto.</b> Nicho que se silencia inmediatamente.</li>
          </ul>

          <h4>Easing curves</h4>
          <ul>
            <li><b>Acuse:</b> ease-out · <code style={{ fontSize: 11, fontFamily: 'monospace' }}>cubic-bezier(.2, .8, .2, 1)</code></li>
            <li><b>Spring:</b> stiffness 200, damping 18 · solo level up.</li>
            <li><b>Linear:</b> solo loops (skeleton, gradient sweep).</li>
            <li><b>Ease-in-out:</b> tug, modals.</li>
          </ul>

          <h4>Para ti (founder)</h4>
          <ul>
            <li><b>Sound design:</b> ¿lo metemos? Si sí → 1 sonido para "complete", 1 para "level up", off por defecto. Nada más.</li>
            <li><b>Haptic en Android:</b> peor soporte. Hacemos best-effort.</li>
            <li><b>"Modo concentrado":</b> esconde TODAS las animaciones, modo zen para listas largas. Pendiente.</li>
          </ul>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas
          title="13 · Microinteracciones · sistema de puntos"
          subtitle="Asistente, no casino. Cada animación con función · celebración reservada."
        >
          <DCSection id="anim" title="Seis animaciones core">
            <DCArtboard id="a1" label="01 · Complete +MP" width={360} height={340}><CompleteAnim /></DCArtboard>
            <DCArtboard id="a2" label="02 · Saldo sube" width={360} height={340}><BalanceAnim /></DCArtboard>
            <DCArtboard id="a3" label="03 · Level up · UNA vez" width={360} height={340}><LevelUpAnim /></DCArtboard>
            <DCArtboard id="a4" label="04 · Negociación tug" width={360} height={340}><NegotiateAnim /></DCArtboard>
            <DCArtboard id="a5" label="05 · Undo swipe" width={360} height={340}><UndoAnim /></DCArtboard>
            <DCArtboard id="a6" label="06 · Loading shimmer" width={360} height={340}><LoadingAnim /></DCArtboard>
          </DCSection>
          <DCSection id="docs" title="Tabla y filosofía">
            <DCArtboard id="spec" label="Spec sheet · easings & duraciones" width={400} height={620}><div style={{ padding: 20 }}><Specs /></div></DCArtboard>
            <DCArtboard id="dec" label="Filosofía & reglas" width={420} height={620}><div style={{ padding: 20 }}><Decisions /></div></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
