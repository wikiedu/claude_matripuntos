<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matripuntos — UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { height: 100%; }
    body {
      background: radial-gradient(ellipse at top, #1a1138 0%, #0d0a1a 50%, #0f0a1e 100%);
      display: flex; align-items: stretch; justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    .phone {
      width: 390px;
      max-width: 100%;
      height: min(860px, calc(100vh - 40px));
      background: linear-gradient(160deg, #0d0a1a, #0f0a1e, #12103a);
      border-radius: 36px;
      border: 1px solid rgba(168,85,247,0.15);
      box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 8px #000;
      overflow: hidden;
      position: relative;
      display: flex; flex-direction: column;
    }
    .phone .inner {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 80px;
      scrollbar-width: thin;
      scrollbar-color: rgba(168,85,247,0.3) transparent;
    }
    .phone .inner::-webkit-scrollbar { width: 6px; }
    .phone .inner::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 3px; }
    #root { height: 100%; display: flex; }
    .page-title {
      padding: 12px 16px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-title h2 { margin: 0; font-size: 20px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.01em; }

    /* Route selector (dev) */
    .route-dev {
      position: fixed; bottom: 12px; left: 12px; z-index: 100;
      background: rgba(15,10,30,0.9); border: 1px solid rgba(168,85,247,0.3);
      border-radius: 10px; padding: 6px; display: flex; gap: 4px; flex-wrap: wrap;
      max-width: 420px; backdrop-filter: blur(8px);
    }
    .route-dev button {
      padding: 4px 10px; font-size: 10px; border-radius: 6px; cursor: pointer;
      background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2);
      color: #c4b5fd; font-weight: 600;
    }
    .route-dev button.active { background: linear-gradient(135deg,#f59e0b,#d97706); color: #fff; border-color: transparent; }
    .route-dev .label { font-size: 9px; color: #6b7280; padding: 4px 6px; text-transform: uppercase; font-weight: 700; align-self: center; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="phone" data-screen-label="Matripuntos App">
    <div class="inner" id="appscroll">
      <div id="root"></div>
    </div>
  </div>
  <div class="route-dev" id="routedev"></div>

  <script type="text/babel" src="./Primitives.jsx"></script>
  <script type="text/babel" src="./Navigation.jsx"></script>
  <script type="text/babel" src="./Dashboard.jsx"></script>
  <script type="text/babel" src="./Tasks.jsx"></script>
  <script type="text/babel" src="./Gamification.jsx"></script>
  <script type="text/babel" src="./Analytics.jsx"></script>
  <script type="text/babel" src="./screens/Login.jsx"></script>
  <script type="text/babel" src="./screens/Signup.jsx"></script>
  <script type="text/babel" src="./screens/Onboarding.jsx"></script>
  <script type="text/babel" src="./screens/RequestActivity.jsx"></script>
  <script type="text/babel" src="./screens/RequestInbox.jsx"></script>
  <script type="text/babel" src="./screens/Calendar.jsx"></script>
  <script type="text/babel" src="./screens/Shopping.jsx"></script>
  <script type="text/babel" src="./screens/Todos.jsx"></script>
  <script type="text/babel" src="./screens/History.jsx"></script>
  <script type="text/babel" src="./screens/Achievements.jsx"></script>
  <script type="text/babel" src="./screens/Settings.jsx"></script>
  <script type="text/babel" src="./screens/NotFound.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const USER    = { name: 'María Ruiz', avatarEmoji: '🐼', avatarColor: '#7c3aed', mood: '😊' };
    const PARTNER = { name: 'Carlos Vidal', avatarEmoji: '🦊', avatarColor: '#f59e0b', mood: '😌' };

    const INITIAL_PENDING = [
      { id: 't1', emoji: '🍳', title: 'Preparar cena',    meta: 'Hoy · 20:00',   points: 12, status: 'pending', assignedTo: 'tú' },
      { id: 't2', emoji: '🧹', title: 'Aspirar el salón', meta: 'Hoy · cuándo puedas', points: 8, status: 'pending', assignedTo: 'tú' },
      { id: 't3', emoji: '🐕', title: 'Sacar a Luna',     meta: 'Hoy · 22:00',   points: 5, status: 'pending', assignedTo: 'Carlos' },
    ];
    const CATALOG = [
      { id: 'c1', emoji: '🛒', title: 'Compra semanal',   estimate: '~45 min',  points: 15 },
      { id: 'c2', emoji: '🧺', title: 'Colada',           estimate: '~10 min + espera', points: 6 },
      { id: 'c3', emoji: '🚿', title: 'Limpiar baño',     estimate: '~25 min',  points: 10 },
      { id: 'c4', emoji: '🗑️', title: 'Sacar la basura',  estimate: '~3 min',   points: 2 },
      { id: 'c5', emoji: '🍽️', title: 'Fregar los platos', estimate: '~15 min', points: 7 },
    ];
    const MOVEMENTS = [
      { id: 'm1', who: 'Carlos', action: 'completó 🐕 sacar a Luna',   when: 'hace 1 h',   delta:  5, avatarEmoji: '🦊', avatarColor: '#f59e0b' },
      { id: 'm2', who: 'Tú',     action: 'completaste 🛒 compra',       when: 'hace 2 h',   delta: 15, avatarEmoji: '🐼', avatarColor: '#7c3aed' },
      { id: 'm3', who: 'Carlos', action: 'propuso nueva regla · cocina', when: 'ayer',      delta:  0, avatarEmoji: '🦊', avatarColor: '#f59e0b' },
      { id: 'm4', who: 'Tú',     action: 'completaste 🧹 limpieza',      when: 'ayer',      delta: 10, avatarEmoji: '🐼', avatarColor: '#7c3aed' },
    ];
    const WEEK_DAYS = [
      { label: 'L', you: 10, partner:  8 },
      { label: 'M', you:  5, partner: 12 },
      { label: 'X', you:  8, partner:  5 },
      { label: 'J', you: 15, partner:  6 },
      { label: 'V', you: 12, partner: 10 },
      { label: 'S', you:  0, partner:  8 },
      { label: 'D', you:  5, partner:  0, today: true },
    ];

    // Flujos principales: auth (login/signup), onboarding, app (con tab), modales full-screen
    function AppRouter() {
      // load persisted route
      const saved = (() => { try { return JSON.parse(localStorage.getItem('mp_route') || 'null'); } catch { return null; } })();
      const [flow, setFlow] = useState(saved?.flow || 'app');        // 'login' | 'signup' | 'onboarding' | 'app' | '404'
      const [screen, setScreen] = useState(saved?.screen || 'dashboard'); // para 'app'
      const [modal, setModal] = useState(null); // 'requestNew' | 'requestInbox' | 'history' | null
      const [toast, setToast] = useState(null);

      // persist
      useEffect(() => {
        localStorage.setItem('mp_route', JSON.stringify({ flow, screen }));
      }, [flow, screen]);

      const showToast = (msg, ms = 1800) => { setToast(msg); setTimeout(() => setToast(null), ms); };

      // Shared app state
      const [pending, setPending] = useState(INITIAL_PENDING);
      const [isPremium, setIsPremium] = useState(false);
      const [balance, setBalance] = useState(15.5);
      const [showSheet, setShowSheet] = useState(false);
      const [showFabMenu, setShowFabMenu] = useState(false);
      const [showHeaderMenu, setShowHeaderMenu] = useState(false);

      const completeTask = id => {
        const t = pending.find(p => p.id === id);
        if (!t || t.status === 'done') return;
        setPending(prev => prev.map(p => p.id === id ? { ...p, status: 'done' } : p));
        setBalance(b => +(b + t.points).toFixed(1));
        showToast(`+${t.points} MP · ${t.emoji} ${t.title}`, 2500);
      };
      const createTask = task => {
        const id = 'n' + Date.now();
        setPending(prev => [{ id, emoji: task.emoji, title: task.title, meta: 'Hoy · cuándo puedas', points: task.points, status: 'pending', assignedTo: 'tú' }, ...prev]);
      };

      useEffect(() => {
        document.getElementById('appscroll').scrollTo({ top: 0, behavior: 'instant' });
      }, [flow, screen, modal]);

      // ====== MODALES FULL-SCREEN ======
      if (modal === 'requestNew') {
        return <RequestActivityScreen
          balance={balance}
          onBack={() => setModal(null)}
          onSend={r => { setBalance(b => +(b - r.offer).toFixed(1)); setModal(null); showToast(`📤 Petición enviada (−${r.offer} MP)`, 2000); }}
        />;
      }
      if (modal === 'requestInbox') {
        return <RequestInboxScreen
          onBack={() => setModal(null)}
          onAccept={r => showToast(`✓ Aceptada: ${r.title} (+${r.offer} MP)`, 2000)}
          onDecline={r => showToast(`✗ Rechazada: ${r.title}`, 1800)}
          onCounter={r => showToast(`↔ Abrir negociación (demo)`, 1800)}
        />;
      }
      if (modal === 'history') {
        return <HistoryScreen onBack={() => setModal(null)} />;
      }

      // ====== FLUJOS ======
      if (flow === 'login') {
        return <LoginScreen
          onLogin={() => { setFlow('app'); setScreen('dashboard'); showToast('👋 ¡Bienvenida de vuelta!'); }}
          onGoSignup={() => setFlow('signup')}
          onForgot={() => showToast('✉️ Email enviado (demo)')}
        />;
      }
      if (flow === 'signup') {
        return <SignupScreen
          onSignup={() => { setFlow('onboarding'); showToast('✨ Cuenta creada'); }}
          onGoLogin={() => setFlow('login')}
        />;
      }
      if (flow === 'onboarding') {
        return <OnboardingScreen
          onComplete={() => { setFlow('app'); setScreen('dashboard'); showToast('🎉 ¡Todo listo!'); }}
        />;
      }
      if (flow === '404') {
        return <NotFoundScreen
          onGoHome={() => { setFlow('app'); setScreen('dashboard'); }}
          onNavigate={id => {
            if (id === 'inbox') setModal('requestInbox');
            else { setFlow('app'); setScreen(id); }
          }}
        />;
      }

      // ====== APP (con bottom nav) ======
      return (
        <div data-screen-label={`app/${screen}`} style={{ width: '100%', display: 'flex', flexDirection: 'column' }}>
          <AppHeader user={USER} partnerMood={PARTNER.mood} partnerName={PARTNER.name.split(' ')[0]}
                     onTheme={() => {}}
                     onBell={() => setModal('requestInbox')}
                     onMenu={() => setShowHeaderMenu(true)} />

          <HeaderMenu
            open={showHeaderMenu}
            onClose={() => setShowHeaderMenu(false)}
            onNavigate={id => {
              setShowHeaderMenu(false);
              if (id === 'achievements') setScreen('achievements');
              else if (id === 'history') setModal('history');
              else if (id === 'shopping') setScreen('shopping');
              else if (id === 'todos') setScreen('todos');
              else if (id === 'settings') setScreen('settings');
              else showToast(`${id} · próximamente`);
            }}
            onLogout={() => { setFlow('login'); showToast('👋 Sesión cerrada'); }}
          />

          {screen === 'dashboard' && (
            <div style={{ paddingTop: 10 }}>
              <DailyPhrase />
              <BalanceLevelHero
                youName="María" youBalance={balance}
                partnerName="Carlos" partnerBalance={-balance}
                level={3} current={320 + Math.round((balance - 15.5))} needed={500}
              />
              <StreakStrip dailyStreak={12} weeklyStreak={4} dailyMult={1.5} weeklyBonus={0.25} />
              <PendingTasksList tasks={pending.filter(p => p.status !== 'done').slice(0, 3)} onComplete={completeTask} />
              <RecentMovements items={MOVEMENTS} />
              <div style={{ height: 20 }} />
            </div>
          )}

          {screen === 'tasks' && (
            <div style={{ paddingTop: 4 }}>
              <div className="page-title"><h2>Tareas</h2><Pill tone="amber">Hoy {pending.filter(p => p.status !== 'done').length}</Pill></div>
              <CategoryFilter selected={null} onSelect={() => {}} />
              <div style={{ margin: '0 16px 12px' }}>
                <Label style={{ marginBottom: 8 }}>Pendientes</Label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {pending.map(t => <TaskItem key={t.id} task={t} onComplete={completeTask} />)}
                </div>
              </div>
              <div style={{ margin: '0 16px 12px' }}>
                <Label style={{ marginBottom: 8 }}>📚 Catálogo</Label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {CATALOG.map(item => (
                    <TaskCatalogRow key={item.id} item={item} onAdd={i => {
                      createTask({ title: i.title, emoji: i.emoji, points: i.points });
                      showToast(`Añadido: ${i.emoji} ${i.title}`);
                    }} />
                  ))}
                </div>
              </div>
              <div style={{ height: 20 }} />
            </div>
          )}

          {screen === 'calendar' && (
            <CalendarScreen onNewEvent={() => setModal('requestNew')} />
          )}

          {screen === 'achievements' && (
            <AchievementsScreen
              onViewAnalytics={() => setScreen('analytics')}
              onBack={() => setScreen('dashboard')}
            />
          )}

          {screen === 'analytics' && (
            <AnalyticsScreen
              isPremium={isPremium}
              onGoPremium={() => { setIsPremium(true); showToast('👑 ¡Premium activado! (demo)', 2000); }}
            />
          )}

          {screen === 'shopping' && <ShoppingScreen />}
          {screen === 'todos'    && <TodosScreen />}

          {screen === 'settings' && (
            <SettingsScreen
              onBack={() => setScreen('dashboard')}
              onLogout={() => { setFlow('login'); showToast('👋 Sesión cerrada'); }}
            />
          )}

          <BottomNav current={screen} onNavigate={setScreen} onFab={() => setShowFabMenu(true)} />

          <FabActionMenu
            open={showFabMenu}
            onClose={() => setShowFabMenu(false)}
            onPick={id => {
              setShowFabMenu(false);
              if (id === 'todo')          setShowSheet(true);
              else if (id === 'activity') setModal('requestNew');
              else if (id === 'shop')     setScreen('shopping');
            }}
          />

          <AddTaskSheet open={showSheet} onClose={() => setShowSheet(false)}
            onCreate={t => { createTask(t); showToast(`Creada: ${t.emoji} ${t.title}`); }} />

          {toast && (
            <div style={{
              position: 'fixed', bottom: 90, left: '50%', transform: 'translateX(-50%)',
              background: 'linear-gradient(135deg,#f59e0b,#d97706)', color: '#fff',
              padding: '10px 18px', borderRadius: 9999, fontSize: 13, fontWeight: 700,
              boxShadow: '0 4px 20px rgba(245,158,11,0.5)', zIndex: 60,
              maxWidth: 360, textAlign: 'center',
            }}>{toast}</div>
          )}
        </div>
      );
    }

    // ====== Dev route selector ======
    function RouteDev({ flow, screen, modal, onSet }) {
      const flows = ['login','signup','onboarding','app','404'];
      const screens = ['dashboard','tasks','calendar','achievements','analytics','shopping','todos','settings'];
      const modals = ['requestNew','requestInbox','history'];
      return (
        <>
          <span className="label">Flow</span>
          {flows.map(f => (
            <button key={f} className={flow === f && !modal ? 'active' : ''}
              onClick={() => onSet({ flow: f, modal: null })}>{f}</button>
          ))}
          {flow === 'app' && <>
            <span className="label">Screen</span>
            {screens.map(s => (
              <button key={s} className={screen === s && !modal ? 'active' : ''}
                onClick={() => onSet({ flow: 'app', screen: s, modal: null })}>{s}</button>
            ))}
            <span className="label">Modal</span>
            {modals.map(m => (
              <button key={m} className={modal === m ? 'active' : ''}
                onClick={() => onSet({ modal: m })}>{m}</button>
            ))}
          </>}
        </>
      );
    }

    // Mount with dev selector that drives localStorage
    function Root() {
      const [tick, setTick] = useState(0);
      const saved = (() => { try { return JSON.parse(localStorage.getItem('mp_route') || 'null'); } catch { return null; } })();
      const [nav, setNav] = useState({ flow: saved?.flow || 'app', screen: saved?.screen || 'dashboard', modal: null });
      useEffect(() => { localStorage.setItem('mp_route', JSON.stringify({ flow: nav.flow, screen: nav.screen })); }, [nav]);
      // re-render on route change by key
      return <>
        <AppRouterControlled key={tick + '-' + nav.flow + '-' + nav.screen + '-' + nav.modal}
          initial={nav}
          onNavChange={newNav => setNav(n => ({ ...n, ...newNav }))} />
        {ReactDOM.createPortal(
          <RouteDev flow={nav.flow} screen={nav.screen} modal={nav.modal}
            onSet={p => { setNav(n => ({ ...n, ...p })); setTick(t => t + 1); }} />,
          document.getElementById('routedev')
        )}
      </>;
    }

    // Thin wrapper that injects initial state
    function AppRouterControlled({ initial, onNavChange }) {
      return <AppRouterInner initial={initial} onNavChange={onNavChange} />;
    }

    // --- Actual router (was AppRouter) rewritten to receive initial ---
    function AppRouterInner({ initial, onNavChange }) {
      const [flow, _setFlow] = useState(initial.flow);
      const [screen, _setScreen] = useState(initial.screen);
      const [modal, _setModal] = useState(initial.modal || null);
      const setFlow = v => { _setFlow(v); onNavChange({ flow: v }); };
      const setScreen = v => { _setScreen(v); onNavChange({ screen: v }); };
      const setModal = v => { _setModal(v); onNavChange({ modal: v }); };

      const [toast, setToast] = useState(null);
      const showToast = (msg, ms = 1800) => { setToast(msg); setTimeout(() => setToast(null), ms); };

      const [pending, setPending] = useState(INITIAL_PENDING);
      const [isPremium, setIsPremium] = useState(false);
      const [balance, setBalance] = useState(15.5);
      const [showSheet, setShowSheet] = useState(false);
      const [showFabMenu, setShowFabMenu] = useState(false);
      const [showHeaderMenu, setShowHeaderMenu] = useState(false);

      const completeTask = id => {
        const t = pending.find(p => p.id === id);
        if (!t || t.status === 'done') return;
        setPending(prev => prev.map(p => p.id === id ? { ...p, status: 'done' } : p));
        setBalance(b => +(b + t.points).toFixed(1));
        showToast(`+${t.points} MP · ${t.emoji} ${t.title}`, 2500);
      };
      const createTask = task => {
        const id = 'n' + Date.now();
        setPending(prev => [{ id, emoji: task.emoji, title: task.title, meta: 'Hoy · cuándo puedas', points: task.points, status: 'pending', assignedTo: 'tú' }, ...prev]);
      };

      useEffect(() => {
        const el = document.getElementById('appscroll');
        if (el) el.scrollTo({ top: 0, behavior: 'instant' });
      }, [flow, screen, modal]);

      // Modales full-screen
      if (modal === 'requestNew') return (
        <RequestActivityScreen balance={balance}
          onBack={() => setModal(null)}
          onSend={r => { setBalance(b => +(b - r.offer).toFixed(1)); setModal(null); showToast(`📤 Petición enviada (−${r.offer} MP)`, 2000); }} />
      );
      if (modal === 'requestInbox') return (
        <RequestInboxScreen onBack={() => setModal(null)}
          onAccept={r => showToast(`✓ Aceptada: ${r.title} (+${r.offer} MP)`, 2000)}
          onDecline={r => showToast(`✗ Rechazada: ${r.title}`)}
          onCounter={r => showToast(`↔ Abrir negociación (demo)`)} />
      );
      if (modal === 'history') return <HistoryScreen onBack={() => setModal(null)} />;

      // Flujos
      if (flow === 'login') return (
        <LoginScreen
          onLogin={() => { setFlow('app'); setScreen('dashboard'); showToast('👋 ¡Bienvenida de vuelta!'); }}
          onGoSignup={() => setFlow('signup')}
          onForgot={() => showToast('✉️ Email enviado (demo)')} />
      );
      if (flow === 'signup') return (
        <SignupScreen
          onSignup={() => { setFlow('onboarding'); showToast('✨ Cuenta creada'); }}
          onGoLogin={() => setFlow('login')} />
      );
      if (flow === 'onboarding') return (
        <OnboardingScreen
          onComplete={() => { setFlow('app'); setScreen('dashboard'); showToast('🎉 ¡Todo listo!'); }} />
      );
      if (flow === '404') return (
        <NotFoundScreen
          onGoHome={() => { setFlow('app'); setScreen('dashboard'); }}
          onNavigate={id => {
            if (id === 'inbox') setModal('requestInbox');
            else { setFlow('app'); setScreen(id); }
          }} />
      );

      return (
        <div data-screen-label={`app/${screen}`} style={{ width: '100%', display: 'flex', flexDirection: 'column' }}>
          <AppHeader user={USER} partnerMood={PARTNER.mood} partnerName={PARTNER.name.split(' ')[0]}
            onTheme={() => {}}
            onBell={() => setModal('requestInbox')}
            onMenu={() => setShowHeaderMenu(true)} />

          <HeaderMenu
            open={showHeaderMenu}
            onClose={() => setShowHeaderMenu(false)}
            onNavigate={id => {
              setShowHeaderMenu(false);
              if (id === 'achievements') setScreen('achievements');
              else if (id === 'history')  setModal('history');
              else if (id === 'shopping') setScreen('shopping');
              else if (id === 'todos')    setScreen('todos');
              else if (id === 'settings') setScreen('settings');
              else showToast(`${id} · próximamente`);
            }}
            onLogout={() => { setFlow('login'); showToast('👋 Sesión cerrada'); }} />

          {screen === 'dashboard' && (
            <div style={{ paddingTop: 10 }}>
              <DailyPhrase />
              <BalanceLevelHero
                youName="María" youBalance={balance}
                partnerName="Carlos" partnerBalance={-balance}
                level={3} current={320 + Math.round((balance - 15.5))} needed={500} />
              <StreakStrip dailyStreak={12} weeklyStreak={4} dailyMult={1.5} weeklyBonus={0.25} />
              <PendingTasksList tasks={pending.filter(p => p.status !== 'done').slice(0, 3)} onComplete={completeTask} />
              <RecentMovements items={MOVEMENTS} />
              <div style={{ height: 20 }} />
            </div>
          )}

          {screen === 'tasks' && (
            <div style={{ paddingTop: 4 }}>
              <div className="page-title"><h2>Tareas</h2><Pill tone="amber">Hoy {pending.filter(p => p.status !== 'done').length}</Pill></div>
              <CategoryFilter selected={null} onSelect={() => {}} />
              <div style={{ margin: '0 16px 12px' }}>
                <Label style={{ marginBottom: 8 }}>Pendientes</Label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {pending.map(t => <TaskItem key={t.id} task={t} onComplete={completeTask} />)}
                </div>
              </div>
              <div style={{ margin: '0 16px 12px' }}>
                <Label style={{ marginBottom: 8 }}>📚 Catálogo</Label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {CATALOG.map(item => (
                    <TaskCatalogRow key={item.id} item={item} onAdd={i => {
                      createTask({ title: i.title, emoji: i.emoji, points: i.points });
                      showToast(`Añadido: ${i.emoji} ${i.title}`);
                    }} />
                  ))}
                </div>
              </div>
              <div style={{ height: 20 }} />
            </div>
          )}

          {screen === 'calendar' && <CalendarScreen onNewEvent={() => setModal('requestNew')} />}

          {screen === 'achievements' && (
            <AchievementsScreen
              onViewAnalytics={() => setScreen('analytics')}
              onBack={() => setScreen('dashboard')} />
          )}

          {screen === 'analytics' && (
            <AnalyticsScreen isPremium={isPremium}
              onGoPremium={() => { setIsPremium(true); showToast('👑 ¡Premium activado! (demo)', 2000); }} />
          )}

          {screen === 'shopping' && <ShoppingScreen />}
          {screen === 'todos'    && <TodosScreen />}

          {screen === 'settings' && (
            <SettingsScreen
              onBack={() => setScreen('dashboard')}
              onLogout={() => { setFlow('login'); showToast('👋 Sesión cerrada'); }} />
          )}

          <BottomNav current={screen} onNavigate={setScreen} onFab={() => setShowFabMenu(true)} />

          <FabActionMenu
            open={showFabMenu}
            onClose={() => setShowFabMenu(false)}
            onPick={id => {
              setShowFabMenu(false);
              if (id === 'todo')          setShowSheet(true);
              else if (id === 'activity') setModal('requestNew');
              else if (id === 'shop')     setScreen('shopping');
            }} />

          <AddTaskSheet open={showSheet} onClose={() => setShowSheet(false)}
            onCreate={t => { createTask(t); showToast(`Creada: ${t.emoji} ${t.title}`); }} />

          {toast && (
            <div style={{
              position: 'fixed', bottom: 90, left: '50%', transform: 'translateX(-50%)',
              background: 'linear-gradient(135deg,#f59e0b,#d97706)', color: '#fff',
              padding: '10px 18px', borderRadius: 9999, fontSize: 13, fontWeight: 700,
              boxShadow: '0 4px 20px rgba(245,158,11,0.5)', zIndex: 60,
              maxWidth: 360, textAlign: 'center',
            }}>{toast}</div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
