name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # El repo es un monorepo con workspaces npm (frontend/backend/database)
      # y un único lockfile en la raíz → cacheamos e instalamos desde ahí.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci || npm install
      - name: Prisma generate
        working-directory: src/backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Typecheck
        working-directory: src/backend
        run: npx tsc --noEmit
      - name: Run hermetic tests
        # Only the tests that don't require a real database. Pure units +
        # contract tests with mocked prisma. DB-bound suites (achievement,
        # analytics) run in the nightly full pipeline (future).
        working-directory: src/backend
        run: >
          npx jest
          --testPathPatterns='(pointsCalculator|taskLogPoints|joinCode|insightHeuristic|taskRoutesContract|healthShape|profileContract|moodHistoryContract|rateLimitContract|authContract|eventsContract|notificationsContract|pointsContract|accountContract|coupleContract|accountDeletionService|coupleLifecycleService|levelService|streakService|challengeService|achievementEngineV2|replayService|cryptoService|recurrenceService|holidaysService|birthdaysService|calendarV2Contract|journalPromptsService|journalRetrospectiveService|journalContract|refreshTokenService|analyticsAggregator|insightsGenerator|digestServiceWeekEnd)'
        env:
          JWT_SECRET: ci-secret-not-for-production
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  backend-db:
    name: Backend — DB-bound tests (Postgres)
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci || npm install
      - name: Prisma generate
        working-directory: src/backend
        run: npx prisma generate
      - name: Apply schema (postgres efímera)
        # Misma estrategia que el job e2e: db push para no atravesar el
        # historial de migraciones (las primeras siguen siendo SQLite-only).
        working-directory: src/backend
        run: npx prisma db push --skip-generate --accept-data-loss
      - name: Run DB-bound tests
        # v2.6.5 audit 11 S0-T-1 — antes estos suites NO corrían en CI
        # porque el job hermetic los excluye vía --testPathPatterns. Aquí
        # los corremos contra una Postgres efímera, separados del job
        # hermetic para que el ruido de DB no bloquee PRs por temas
        # ortogonales.
        working-directory: src/backend
        run: >
          npx jest
          --testPathPatterns='(analyticsService|anniversaryService|gamificationService|achievementEngine\.test)'

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci || npm install
      - name: Typecheck
        working-directory: src/frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: src/frontend
        run: npm run build

  e2e:
    name: E2E — Playwright (chromium + webkit)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, webkit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci || npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ matrix.project }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps ${{ matrix.project }}
      - name: Prisma generate (backend)
        working-directory: src/backend
        run: npx prisma generate
      - name: Apply schema (postgres efímera)
        # v2.0.6 fix CI: usamos db push contra la BD efímera porque la migración
        # inicial 20260331152147_init usa sintaxis SQLite (DATETIME) que rompe
        # contra Postgres. db push aplica el schema vigente sin pasar por el
        # historial de migraciones — perfectamente válido para una DB ephemeral
        # de tests donde no hay datos que migrar. Producción sigue usando
        # `migrate deploy` con migraciones nuevas (Postgres-compatibles).
        working-directory: src/backend
        run: npx prisma db push --skip-generate --accept-data-loss
      - name: Build frontend
        working-directory: src/frontend
        run: npm run build
        env:
          VITE_API_BASE: http://localhost:3001
      - name: Start backend (background)
        working-directory: src/backend
        run: nohup npm run dev > backend.log 2>&1 &
        env:
          PORT: '3001'
          NODE_ENV: test
      - name: Start frontend preview (background)
        working-directory: src/frontend
        run: nohup npx vite preview --port 5174 > frontend.log 2>&1 &
      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3001/api/health http://localhost:5174 --timeout 60000
      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test --project=${{ matrix.project }}
        env:
          E2E_BASE_URL: http://localhost:5174
          CI: 'true'
      - name: Backend log on failure
        if: failure()
        run: tail -200 src/backend/backend.log || true
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: e2e/playwright-report
          retention-days: 7
