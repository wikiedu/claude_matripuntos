name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # El repo es un monorepo con workspaces npm (frontend/backend/database)
      # y un único lockfile en la raíz → cacheamos e instalamos desde ahí.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci || npm install
      - name: Prisma generate
        working-directory: src/backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Typecheck
        working-directory: src/backend
        run: npx tsc --noEmit
      - name: Run hermetic tests
        # Only the tests that don't require a real database. Pure units +
        # contract tests with mocked prisma. DB-bound suites (achievement,
        # analytics) run in the nightly full pipeline (future).
        working-directory: src/backend
        run: >
          npx jest
          --testPathPatterns='(pointsCalculator|taskLogPoints|joinCode|insightHeuristic|taskRoutesContract|healthShape|profileContract|moodHistoryContract)'
        env:
          JWT_SECRET: ci-secret-not-for-production
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspaces
        run: npm ci || npm install
      - name: Typecheck
        working-directory: src/frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: src/frontend
        run: npm run build
